<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // SPA redirect for GitHub Pages
      // Captures the current path and redirects to index.html with the path as a query param
      var pathSegmentsToKeep = 0; // set to 1 if serving from a repo subdirectory
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        encodeURIComponent(l.pathname.slice(1)) +
        (l.search ? '&q=' + encodeURIComponent(l.search.slice(1)) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
